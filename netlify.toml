[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  VITE_BASE_PATH = "/"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# API Supabase Edge Functions (proxy si besoin)
[[redirects]]
  from = "/api/*"
  to = "https://your-project.supabase.co/functions/v1/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"