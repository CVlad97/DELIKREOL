name: Patch Public Home

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  remove-pilot-drivers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove fictional pilot drivers
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/pages/PublicHomePage.tsx')
          text = path.read_text()
          old = """const pilotDrivers = [\n  { id: 'driver-1', name: 'Livreur pilote FDF', latitude: 14.612, longitude: -61.0708 },\n  { id: 'driver-2', name: 'Livreur pilote Lamentin', latitude: 14.6074, longitude: -61.0054 },\n];"""
          new = """const pilotDrivers: Array<{ id: string; name: string; latitude: number; longitude: number }> = [];"""
          if old not in text:
              print('No pilot driver block found or already patched.')
          else:
              path.write_text(text.replace(old, new))
              print('Pilot driver block removed.')
          PY

      - name: Commit patch if needed
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pages/PublicHomePage.tsx
          git commit -m "Remove fictional pilot drivers"
          git push
