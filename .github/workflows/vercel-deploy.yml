name: Vercel Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check Vercel configuration
        id: vercel_config
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Vercel deploy enabled."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Vercel deploy skipped: VERCEL_TOKEN, VERCEL_ORG_ID or VERCEL_PROJECT_ID is missing."
          fi

      - name: Install Vercel CLI
        if: steps.vercel_config.outputs.enabled == 'true'
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment
        if: steps.vercel_config.outputs.enabled == 'true'
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Artifacts (Vercel)
        if: steps.vercel_config.outputs.enabled == 'true'
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel
        if: steps.vercel_config.outputs.enabled == 'true' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
