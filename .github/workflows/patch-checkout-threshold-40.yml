name: Patch Checkout Threshold 40

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Patch checkout out-zone behavior
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/pages/PublicHomePage.tsx')
          text = path.read_text()
          old = """    if (fulfillmentMode === 'delivery' && deliveryCoverage.status === 'out_zone') {
      setCheckoutStatus({
        kind: 'error',
        message: deliveryCoverage.message || 'Livraison impossible pour cette adresse/position. Passez en retrait ou changez d’adresse.',
      });
      return;
    }"""
          new = """    if (
      fulfillmentMode === 'delivery' &&
      deliveryCoverage.status === 'out_zone' &&
      selectionEconomics.total_client < 40
    ) {
      setCheckoutStatus({
        kind: 'error',
        message:
          deliveryCoverage.message ||
          'On doit vérifier si la livraison est possible ici. À partir de 40 €, une demande de livraison éloignée peut être transmise par WhatsApp.',
      });
      return;
    }"""
          if old in text:
              path.write_text(text.replace(old, new))
              print('checkout threshold patched')
          else:
              print('target block not found or already patched')
          PY

      - name: Commit if needed
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pages/PublicHomePage.tsx
          git commit -m "Allow extended delivery check from 40 euros"
          git push
