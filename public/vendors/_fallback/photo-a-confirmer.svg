<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Photo produit à confirmer</title>
  <desc id="desc">Fond provisoire neutre pour produit en attente de photo officielle.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="45%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#fed7aa"/>
    </linearGradient>
    <pattern id="madras" width="96" height="96" patternUnits="userSpaceOnUse">
      <rect width="96" height="96" fill="none"/>
      <rect x="0" y="0" width="96" height="9" fill="#15803d" opacity="0.22"/>
      <rect x="0" y="34" width="96" height="9" fill="#f97316" opacity="0.24"/>
      <rect x="0" y="70" width="96" height="8" fill="#dc2626" opacity="0.18"/>
      <rect x="18" y="0" width="8" height="96" fill="#15803d" opacity="0.18"/>
      <rect x="56" y="0" width="8" height="96" fill="#f97316" opacity="0.20"/>
    </pattern>
    <radialGradient id="light" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.84"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="800" rx="48" fill="url(#bg)"/>
  <rect width="1200" height="800" rx="48" fill="url(#madras)" opacity="0.55"/>
  <rect width="1200" height="800" rx="48" fill="url(#light)"/>
  <circle cx="210" cy="170" r="96" fill="#ffffff" opacity="0.28"/>
  <circle cx="1040" cy="645" r="150" fill="#ffffff" opacity="0.20"/>
</svg>
