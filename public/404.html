    <!--
      SPA fallback — GitHub Pages compatible.
      Ce fichier est copié dans dist/404.html à chaque build (full index.html).
      En attente du CI, cette version sert de fallback minimal avec redirection.
    -->
    <script>
      // Redirection vers l'application via sessionStorage (GitHub Pages SPA workaround)
      (function() {
        var redirect = sessionStorage.getItem('redirect');
        if (redirect) {
          sessionStorage.removeItem('redirect');
          var base = '/DELIKREOL/';
          var path = redirect.replace(window.location.origin, '');
          if (path.startsWith(base)) {
            window.location.href = redirect;
          } else {
            window.location.href = base.replace(/\/+$/, '') + path;
          }
        }
      })();
    </script>
  </head>
  <body>
    <p>Redirection vers DeliKreol…</p>
    <script>
      // Fallback: rediriger vers la racine de l'application
      sessionStorage.setItem('redirect', window.location.href);
      window.location.href = '/DELIKREOL/';
    </script>
  </body>
