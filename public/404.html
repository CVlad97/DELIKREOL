<!doctype html>
<html lang="fr-MQ">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DELIKREOL</title>
    <script>
      // GitHub Pages SPA fallback → HashRouter compatible
      var path = window.location.pathname.replace('/DELIKREOL/', '').replace(/^\/+/, '');
      if (path && path !== '') {
        window.location.replace('/DELIKREOL/#' + path);
      } else {
        window.location.replace('/DELIKREOL/');
      }
    </script>
  </head>
  <body>
    <p>Redirection…</p>
  </body>
</html>
