<svg width="1200" height="500" viewBox="0 0 1200 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky gradient -->
  <rect width="1200" height="500" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="1050" cy="80" r="50" fill="#FFD700" opacity="0.8"/>
  <!-- Palm trees -->
  <g transform="translate(100,150)">
    <rect x="18" y="0" width="8" height="120" rx="3" fill="#8B4513"/>
    <ellipse cx="22" cy="-10" rx="40" ry="25" fill="#2D8B2D"/>
    <ellipse cx="22" cy="-20" rx="35" ry="20" fill="#3CB043"/>
    <ellipse cx="-10" cy="-5" rx="30" ry="18" fill="#2D8B2D"/>
    <ellipse cx="55" cy="-5" rx="30" ry="18" fill="#2D8B2D"/>
  </g>
  <g transform="translate(180,170) scale(0.8)">
    <rect x="18" y="0" width="8" height="120" rx="3" fill="#8B4513"/>
    <ellipse cx="22" cy="-10" rx="40" ry="25" fill="#2D8B2D"/>
    <ellipse cx="22" cy="-20" rx="35" ry="20" fill="#3CB043"/>
  </g>
  <!-- Delivery scooter -->
  <g transform="translate(650,280)">
    <ellipse cx="20" cy="40" rx="18" ry="18" fill="#333"/>
    <ellipse cx="80" cy="40" rx="18" ry="18" fill="#333"/>
    <rect x="-10" y="10" width="70" height="25" rx="8" fill="#FF6B00"/>
    <rect x="50" y="0" width="40" height="35" rx="5" fill="#FF8C38"/>
    <circle cx="50" cy="25" r="5" fill="#FFF"/>
    <path d="M-5 20 L-25 15 L-25 30 L-5 25" fill="#555"/>
    <!-- Food box on scooter -->
    <rect x="55" y="-15" width="30" height="20" rx="4" fill="#FFD700"/>
    <rect x="55" y="-15" width="30" height="5" rx="2" fill="#FF6B00"/>
    <line x1="70" y1="-15" x2="70" y2="5" stroke="#FF6B00" stroke-width="1.5"/>
  </g>
  <!-- Chef characters -->
  <g transform="translate(420,300)">
    <circle cx="30" cy="10" r="18" fill="#F5CBBE"/>
    <rect x="12" y="2" width="36" height="8" rx="4" fill="white"/>
    <rect x="8" y="-2" width="44" height="12" rx="6" fill="white" stroke="#DDD" stroke-width="1"/>
    <!-- Chef body -->
    <rect x="14" y="28" width="32" height="40" rx="6" fill="white"/>
    <!-- Apron -->
    <rect x="18" y="32" width="24" height="36" rx="4" fill="#FF6B00"/>
  </g>
  <g transform="translate(520,310) scale(0.9)">
    <circle cx="30" cy="10" r="18" fill="#D4A574"/>
    <rect x="12" y="2" width="36" height="8" rx="4" fill="white"/>
    <rect x="8" y="-2" width="44" height="12" rx="6" fill="white" stroke="#DDD" stroke-width="1"/>
    <rect x="14" y="28" width="32" height="40" rx="6" fill="white"/>
    <rect x="18" y="32" width="24" height="36" rx="4" fill="#FF6B00"/>
  </g>
  <!-- Madras pattern border bottom -->
  <rect y="460" width="1200" height="40" fill="url(#madras)"/>
  <!-- Tropical flowers -->
  <circle cx="200" cy="380" r="12" fill="#FF69B4" opacity="0.6"/>
  <circle cx="215" cy="375" r="10" fill="#FF1493" opacity="0.5"/>
  <circle cx="207" cy="365" r="8" fill="#FFB6C1" opacity="0.7"/>
  <circle cx="900" cy="390" r="12" fill="#FF69B4" opacity="0.6"/>
  <circle cx="915" cy="385" r="10" fill="#FF1493" opacity="0.5"/>
  <circle cx="907" cy="375" r="8" fill="#FFB6C1" opacity="0.7"/>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE4B5"/>
      <stop offset="50%" stop-color="#FFF8DC"/>
      <stop offset="100%" stop-color="#FFEEDD"/>
    </linearGradient>
    <pattern id="madras" patternUnits="userSpaceOnUse" width="40" height="40">
      <rect width="40" height="40" fill="#FF6B00"/>
      <rect width="20" height="20" fill="#FFD700" opacity="0.4"/>
      <rect x="20" y="20" width="20" height="20" fill="#FFD700" opacity="0.4"/>
      <line x1="0" y1="20" x2="40" y2="20" stroke="#2D8B2D" stroke-width="2" opacity="0.5"/>
      <line x1="20" y1="0" x2="20" y2="40" stroke="#2D8B2D" stroke-width="2" opacity="0.5"/>
    </pattern>
  </defs>
</svg>